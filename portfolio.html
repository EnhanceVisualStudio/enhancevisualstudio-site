<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:white;font-family:Inter,sans-serif}
a{text-decoration:none;color:white}
nav{padding:24px 7%;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.1)}
.logo{font-family:"Playfair Display",serif;letter-spacing:2px}
.links a{margin-left:28px;font-size:.78rem;letter-spacing:2px;opacity:.7}
.links a:hover{opacity:1}
header{padding:90px 7% 40px}
h1{font-family:"Playfair Display",serif;font-size:clamp(3rem,7vw,6rem);font-weight:500}
p{opacity:.7;margin-top:12px;max-width:650px;line-height:1.7}
.grid{padding:30px 7% 80px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.card{position:relative;height:430px;overflow:hidden}
.card img{width:100%;height:100%;object-fit:cover;filter:brightness(.72);transition:.5s}
.card:hover img{transform:scale(1.06);filter:brightness(.95)}
.card span{position:absolute;left:22px;bottom:22px;font-size:.8rem;letter-spacing:2px;text-transform:uppercase}
@media(max-width:900px){nav{display:block;text-align:center}.links{margin-top:14px}.links a{margin:0 8px}.grid{grid-template-columns:1fr}.card{height:380px}}
</style>
</head>
