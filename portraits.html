<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfolio — Enhance Visual Studio</title>
  <style>
    :root{
      --bg:#0b0b0d;
      --panel:#111114;
      --text:#f6f6f7;
      --muted:rgba(246,246,247,.72);
      --line:rgba(255,255,255,.12);
      --shadow: 0 12px 40px rgba(0,0,0,.45);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background: radial-gradient(1000px 600px at 20% 0%, rgba(255,255,255,.06), transparent 60%),
                  radial-gradient(800px 500px at 80% 20%, rgba(255,255,255,.04), transparent 60%),
                  var(--bg);
      color:var(--text);
    }
    a{color:inherit;text-decoration:none}
    .wrap{max-width:1100px;margin:0 auto;padding:28px 18px 60px}
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:14px;
      padding:12px 14px;border:1px solid var(--line);border-radius:999px;
      background:rgba(17,17,20,.55);backdrop-filter: blur(10px);
    }
    .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;font-size:13px}
    .nav{display:flex;gap:14px;font-size:13px;color:var(--muted)}
    .nav a{padding:8px 10px;border-radius:999px}
    .nav a:hover{background:rgba(255,255,255,.06);color:var(--text)}
    .btn{
      display:inline-flex;align-items:center;justify-content:center;
      padding:10px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.22);
      background:rgba(255,255,255,.04);
      font-weight:600;font-size:13px;letter-spacing:.02em;
      box-shadow: 0 10px 20px rgba(0,0,0,.2);
    }
    .btn:hover{background:rgba(255,255,255,.08)}
    header{padding:26px 2px 18px}
    h1{margin:0;font-size:34px;letter-spacing:.06em;text-transform:uppercase}
    .sub{margin-top:10px;color:var(--muted);max-width:70ch;line-height:1.5}
    .tip{margin-top:10px;color:rgba(255,255,255,.5);font-size:12px}

    /* Grid */
    .grid{
      margin-top:18px;
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:14px;
    }
    @media (max-width: 920px){ .grid{grid-template-columns: repeat(2, 1fr);} }
    @media (max-width: 560px){ .grid{grid-template-columns: 1fr;} }

    .tile{
      position:relative;
      border-radius: var(--radius);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.03);
      box-shadow: var(--shadow);
      cursor:pointer;
      min-height: 210px;
      isolation:isolate;
    }
    .tile img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      transform: scale(1.02);
      transition: transform .25s ease, filter .25s ease;
      filter: contrast(1.03) saturate(1.03);
    }
    .tile:hover img{transform: scale(1.06)}
    .tile::after{
      content:"";
      position:absolute;inset:0;
      background: linear-gradient(to top, rgba(0,0,0,.55), transparent 55%);
      opacity:.65;
      pointer-events:none;
    }

    /* Lightbox */
    .lb{
      position:fixed; inset:0; z-index:9999;
      background: rgba(0,0,0,.86);
      display:none;
      align-items:center; justify-content:center;
      padding:18px;
    }
    .lb.open{display:flex}
    .lb-inner{
      width:min(1100px, 100%);
      height:min(82vh, 820px);
      position:relative;
      border-radius: 22px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(12,12,14,.9);
      box-shadow: 0 30px 80px rgba(0,0,0,.6);
    }
    .lb-img{
      width:100%; height:100%;
      object-fit:contain;
      display:block;
      background: radial-gradient(600px 300px at 50% 15%, rgba(255,255,255,.08), transparent 60%);
    }
    .lb-top{
      position:absolute; top:12px; left:12px; right:12px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      pointer-events:none;
    }
    .lb-meta{
      pointer-events:auto;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.35);
      color:rgba(255,255,255,.85);
      font-size:12px;
      letter-spacing:.08em;
      text-transform:uppercase;
      backdrop-filter: blur(10px);
    }
    .lb-actions{
      pointer-events:auto;
      display:flex; gap:10px; align-items:center;
    }
    .lb-actions button{
      cursor:pointer;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.35);
      color:rgba(255,255,255,.92);
      font-weight:700;
      letter-spacing:.02em;
      backdrop-filter: blur(10px);
    }
    .lb-actions button:hover{background:rgba(255,255,255,.10)}
    .lb-nav{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 10px;
      pointer-events:none;
    }
    .lb-nav button{
      pointer-events:auto;
      width:46px;height:46px;border-radius:50%;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(0,0,0,.35);
      color:#fff;
      font-size:22px;
      cursor:pointer;
      backdrop-filter: blur(10px);
    }
    .lb-nav button:hover{background:rgba(255,255,255,.10)}
    footer{margin-top:26px;color:rgba(255,255,255,.45);font-size:12px;text-align:center}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">Enhance Visual Studio</div>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>
      </nav>
      <a class="btn" href="https://calendly.com/bookenhancevisualstudio/1-hour-photography-session" target="_blank" rel="noopener">Book Now</a>
    </div>

    <header>
      <h1>Portfolio</h1>
      <div class="sub">One curated collection. Click any image to view fullscreen.</div>
      <div class="tip">Tip: Use ◀ ▶ or swipe (mobile). Press Esc to close (desktop).</div>
    </header>

    <main class="grid" id="grid"></main>

    <footer>© <span id="year"></span> Enhance Visual Studio</footer>
  </div>

  <!-- Lightbox -->
  <div class="lb" id="lb" aria-hidden="true">
    <div class="lb-inner">
      <img class="lb-img" id="lbImg" alt="Fullscreen portfolio image" />
      <div class="lb-top">
        <div class="lb-meta" id="lbMeta">Portfolio</div>
        <div class="lb-actions">
          <button id="downloadBtn" type="button">Download</button>
          <button id="closeBtn" type="button">Close ×</button>
        </div>
      </div>
      <div class="lb-nav">
        <button id="prevBtn" type="button" aria-label="Previous">‹</button>
        <button id="nextBtn" type="button" aria-label="Next">›</button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    // ✅ EDIT THIS ONE NUMBER ONLY
    // Set it to how many images you uploaded in /images/portfolio/
    const IMAGE_COUNT = 12;

    // Builds: images/portfolio/01.jpg ... 12.jpg (with leading zeros)
    const images = Array.from({length: IMAGE_COUNT}, (_, i) => {
      const n = String(i + 1).padStart(2, "0");
      return `images/portfolio/${n}.jpg`;
    });

    const grid = document.getElementById("grid");

    // Render grid tiles
    images.forEach((src, i) => {
      const tile = document.createElement("div");
      tile.className = "tile";
      tile.innerHTML = `<img src="${src}" loading="lazy" alt="Portfolio image ${i+1}">`;
      tile.addEventListener("click", () => openLB(i));
      grid.appendChild(tile);
    });

    // Lightbox logic
    const lb = document.getElementById("lb");
    const lbImg = document.getElementById("lbImg");
    const lbMeta = document.getElementById("lbMeta");
    const closeBtn = document.getElementById("closeBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    let idx = 0;

    function setLB(){
      const src = images[idx];
      lbImg.src = src;
      lbMeta.textContent = `Portfolio • ${idx + 1} / ${images.length}`;
      downloadBtn.onclick = () => {
        const a = document.createElement("a");
        a.href = src;
        a.download = src.split("/").pop();
        document.body.appendChild(a);
        a.click();
        a.remove();
      };
    }

    function openLB(i){
      idx = i;
      setLB();
      lb.classList.add("open");
      lb.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeLB(){
      lb.classList.remove("open");
      lb.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
      lbImg.src = ""; // helps memory on mobile
    }

    function prev(){
      idx = (idx - 1 + images.length) % images.length;
      setLB();
    }
    function next(){
      idx = (idx + 1) % images.length;
      setLB();
    }

    closeBtn.addEventListener("click", closeLB);
    prevBtn.addEventListener("click", prev);
    nextBtn.addEventListener("click", next);

    // click outside image area closes
    lb.addEventListener("click", (e) => {
      if (e.target === lb) closeLB();
    });

    // Keyboard controls
    window.addEventListener("keydown", (e) => {
      if (!lb.classList.contains("open")) return;
      if (e.key === "Escape") closeLB();
      if (e.key === "ArrowLeft") prev();
      if (e.key === "ArrowRight") next();
    });

    // Simple swipe (mobile)
    let startX = null;
    lb.addEventListener("touchstart", (e) => startX = e.touches[0].clientX, {passive:true});
    lb.addEventListener("touchend", (e) => {
      if (startX === null) return;
      const dx = e.changedTouches[0].clientX - startX;
      if (Math.abs(dx) > 40) dx > 0 ? prev() : next();
      startX = null;
    }, {passive:true});
  </script>
</body>
</html>
