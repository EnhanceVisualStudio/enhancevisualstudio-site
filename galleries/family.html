<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#070707" />
  <title>Kids / Family | Enhance Visual Studio</title>
  <style>
    :root{--bg:#070707;--text:#fff;--muted:rgba(255,255,255,.70);--muted2:rgba(255,255,255,.50);--shadow:0 18px 55px rgba(0,0,0,.55);--radius:18px;--max:1120px;}
    *{box-sizing:border-box} html,body{height:100%}
    body{margin:0;background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;letter-spacing:.2px}
    a{color:inherit;text-decoration:none} a:hover{opacity:.9}
    .nav{position:fixed;top:0;left:0;right:0;z-index:20;background:linear-gradient(to bottom, rgba(7,7,7,.86), rgba(7,7,7,.18));border-bottom:1px solid rgba(255,255,255,.08);backdrop-filter:blur(12px)}
    .nav-inner{max-width:var(--max);margin:0 auto;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:14px}
    .brand{display:flex;flex-direction:column;line-height:1.1;text-transform:uppercase;letter-spacing:1.6px;font-size:12px}
    .brand span{margin-top:4px;text-transform:none;letter-spacing:.2px;color:var(--muted2);font-size:11px}
    .nav-right{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .chip{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.03);padding:10px 12px;border-radius:999px;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.85)}
    main{max-width:var(--max);margin:0 auto;padding:96px 18px 44px}
    h1{margin:0 0 8px;font-size:26px;letter-spacing:-.2px}
    .sub{margin:0 0 18px;color:var(--muted);font-size:13px;line-height:1.6;max-width:720px}
    .masonry{columns:3 280px;column-gap:12px}
    figure{break-inside:avoid;margin:0 0 12px;border-radius:var(--radius);overflow:hidden;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.02);box-shadow:0 16px 46px rgba(0,0,0,.35);cursor:pointer}
    figure img{width:100%;height:auto;display:block;opacity:.96;transform:scale(1.01);transition:transform .45s ease, opacity .45s ease}
    figure:hover img{transform:scale(1.05);opacity:1}
    .lightbox{position:fixed;inset:0;background:rgba(7,7,7,.92);display:none;align-items:center;justify-content:center;z-index:50;padding:18px;backdrop-filter:blur(10px)}
    .lightbox.open{display:flex}
    .lightbox img{max-width:min(1100px, 96vw);max-height:86vh;border-radius:16px;border:1px solid rgba(255,255,255,.14);box-shadow:var(--shadow)}
    .lb-top{position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;gap:10px;pointer-events:none}
    .lb-btn{pointer-events:auto;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.03);color:rgba(255,255,255,.90);padding:10px 12px;border-radius:999px;font-size:12px;text-transform:uppercase;letter-spacing:1px;cursor:pointer}
    footer{border-top:1px solid rgba(255,255,255,.10);padding:22px 18px;color:var(--muted2);font-size:12px}
    .footer-inner{max-width:var(--max);margin:0 auto;display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}
    @media (max-width:900px){.masonry{columns:2 220px}}
    @media (max-width:520px){.masonry{columns:1}}
  </style>
</head>
<body>
  <div class="nav">
    <div class="nav-inner">
      <a class="brand" href="../index.html">Enhance Visual Studio<span>Pose. Capture. Enhance.</span></a>
      <div class="nav-right">
        <a class="chip" href="portraits.html">← Portraits</a>
        <a class="chip" href="events.html">Next → Events</a>
        <a class="chip" href="../index.html#portfolio">Back</a>
      </div>
    </div>
  </div>

  <main>
    <h1>Kids / Family</h1>
    <p class="sub">Minimal. Image-first. Tap any photo to view fullscreen.</p>

    <div class="masonry">
      <figure><img src="../images/IMG_0256.jpeg" alt="Family" loading="lazy"></figure>
      <figure><img src="../images/IMG_0258.jpeg" alt="Family" loading="lazy"></figure>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <div>© <span id="year"></span> Enhance Visual Studio</div>
      <a href="mailto:hello@enhancevisualstudio.com">hello@enhancevisualstudio.com</a>
    </div>
  </footer>

  <div id="lightbox" class="lightbox" aria-hidden="true">
    <div class="lb-top">
      <button class="lb-btn" id="lbClose" type="button">Close</button>
      <button class="lb-btn" id="lbDownload" type="button">Open Original</button>
    </div>
    <img id="lbImg" src="" alt="Fullscreen photo">
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    const lb=document.getElementById('lightbox'), lbImg=document.getElementById('lbImg');
    const lbClose=document.getElementById('lbClose'), lbDownload=document.getElementById('lbDownload');
    function openLB(src){ lbImg.src=src; lb.classList.add('open'); document.body.style.overflow='hidden'; lbDownload.onclick=()=>window.open(src,'_blank'); }
    function closeLB(){ lb.classList.remove('open'); document.body.style.overflow=''; lbImg.src=''; }
    document.querySelectorAll('figure img').forEach(img=>img.addEventListener('click',()=>openLB(img.getAttribute('src'))));
    lbClose.addEventListener('click',closeLB);
    lb.addEventListener('click',(e)=>{ if(e.target===lb) closeLB(); });
    document.addEventListener('keydown',(e)=>{ if(e.key==='Escape' && lb.classList.contains('open')) closeLB(); });
  </script>
</body>
</html>
