<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portraits | Enhance Visual Studio</title>
  <style>
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:#0b0b0c;color:#fff}
    a{color:inherit;text-decoration:none}
    .wrap{max-width:1100px;margin:auto;padding:28px 18px}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .title{letter-spacing:.18em;text-transform:uppercase;font-weight:800;font-size:14px}
    .btn{border:1px solid rgba(255,255,255,.35);padding:10px 14px;border-radius:999px;letter-spacing:.12em;text-transform:uppercase;font-size:12px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:16px}
    .grid img{width:100%;height:340px;object-fit:cover;border-radius:14px;border:1px solid rgba(255,255,255,.10);cursor:pointer}
    .muted{color:rgba(255,255,255,.65);font-size:13px;line-height:1.6;margin-top:8px}
    /* lightbox */
    .lb{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;place-items:center;padding:18px}
    .lb.open{display:grid}
    .frame{width:min(1100px,100%);max-height:80vh;background:#000;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.14)}
    .frame img{width:100%;height:72vh;object-fit:contain;background:#000}
    .bar{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:rgba(15,15,18,.92);border-top:1px solid rgba(255,255,255,.12)}
    .icon{width:42px;height:42px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:transparent;color:#fff;cursor:pointer}
    .row{display:flex;gap:8px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="title">Portraits</div>
        <div class="muted">Tap any photo to view fullscreen.</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a class="btn" href="index.html#portfolio">← Back</a>
        <a class="btn" href="https://calendly.com/bookenhancevisualstudio/1-hour-photography-session" target="_blank" rel="noopener">Book Session</a>
      </div>
    </div>

    <div class="grid" id="grid">
      <img src="images/pic01.jpg" alt="Portrait 1">
      <img src="images/pic02.jpg" alt="Portrait 2">
      <img src="images/pic03.jpg" alt="Portrait 3">
      <img src="images/pic04.jpg" alt="Portrait 4">
    </div>
  </div>

  <div class="lb" id="lb">
    <div class="frame">
      <img id="lbImg" alt="Fullscreen portrait" />
      <div class="bar">
        <div class="muted" id="cap">Portraits</div>
        <div class="row">
          <button class="icon" id="prev">‹</button>
          <button class="icon" id="next">›</button>
          <button class="icon" id="close">✕</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const imgs = Array.from(document.querySelectorAll("#grid img"));
    const lb = document.getElementById("lb");
    const lbImg = document.getElementById("lbImg");
    let i = 0;

    function openAt(idx){ i=idx; lbImg.src = imgs[i].src; lb.classList.add("open"); document.body.style.overflow="hidden"; }
    function closeLb(){ lb.classList.remove("open"); document.body.style.overflow=""; }
    function next(){ i=(i+1)%imgs.length; lbImg.src = imgs[i].src; }
    function prev(){ i=(i-1+imgs.length)%imgs.length; lbImg.src = imgs[i].src; }

    imgs.forEach((im, idx)=> im.addEventListener("click", ()=> openAt(idx)));
    document.getElementById("close").addEventListener("click", closeLb);
    document.getElementById("next").addEventListener("click", next);
    document.getElementById("prev").addEventListener("click", prev);
    lb.addEventListener("click", (e)=>{ if(e.target===lb) closeLb(); });
    window.addEventListener("keydown",(e)=>{
      if(!lb.classList.contains("open")) return;
      if(e.key==="Escape") closeLb();
      if(e.key==="ArrowRight") next();
      if(e.key==="ArrowLeft") prev();
    });
  </script>
</body>
</html>
