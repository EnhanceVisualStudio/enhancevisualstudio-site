<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portrait Photography | Enhance Visual Studio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #0b0b0b;
      color: #ffffff;
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .topbar-inner {
      width: min(1180px, 92%);
      margin: 0 auto;
      padding: 18px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      font-size: 0.92rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .hero {
      padding: 110px 20px 55px;
      text-align: center;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 5vw, 4rem);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .hero p {
      max-width: 760px;
      margin: 0 auto;
      color: #cfcfcf;
    }

    .gallery-wrap {
      width: min(1240px, 94%);
      margin: 0 auto;
      padding: 0 0 70px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .gallery-grid img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      border-radius: 12px;
      display: block;
      transition: transform 0.35s ease;
    }

    .gallery-grid img:hover {
      transform: scale(1.02);
    }

    .footer {
      text-align: center;
      padding: 28px 20px 40px;
      color: #8b8b8b;
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 700px) {
      .gallery-grid {
        grid-template-columns: 1fr;
      }

      .gallery-grid img {
        height: 320px;
      }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <a href="../index.html" class="brand">ENHANCE</a>
      <a href="../index.html">Back Home</a>
    </div>
  </div>

  <section class="hero">
    <h1>Portrait Photography</h1>
    <p>
      A curated gallery of portrait work by Enhance Visual Studio.
    </p>
  </section>

  <div class="gallery-wrap">
    <div class="gallery-grid">
      <img src="../assets/portraits/portrait-1.jpg" alt="Portrait photo 1">
      <img src="../assets/portraits/portrait-2.jpg" alt="Portrait photo 2">
      <img src="../assets/portraits/portrait-3.jpg" alt="Portrait photo 3">
      <img src="../assets/portraits/portrait-4.jpg" alt="Portrait photo 4">
      <img src="../assets/portraits/portrait-5.jpg" alt="Portrait photo 5">
      <img src="../assets/portraits/portrait-6.jpg" alt="Portrait photo 6">
      <img src="../assets/portraits/portrait-7.jpg" alt="Portrait photo 7">
      <img src="../assets/portraits/portrait-8.jpg" alt="Portrait photo 8">
      <img src="../assets/portraits/portrait-9.jpg" alt="Portrait photo 9">
      <img src="../assets/portraits/portrait-10.jpg" alt="Portrait photo 10">
    </div>
  </div>

  <div class="footer">
    © 2026 Enhance Visual Studio
  </div>

</body>
</html>
