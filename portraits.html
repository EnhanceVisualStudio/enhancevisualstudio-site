<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portraits • Enhance Visual Studio</title>
  <style>
    :root{
      --bg:#050505;
      --fg:#fff;
      --muted:rgba(255,255,255,.75);
      --line:rgba(255,255,255,.14);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--fg);
    }
    a{color:inherit;text-decoration:none}

    .top{
      position:sticky; top:0;
      z-index:20;
      background:rgba(0,0,0,.72);
      backdrop-filter: blur(8px);
      border-bottom:1px solid var(--line);
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .top .left{
      display:flex; align-items:center; gap:12px;
      min-width:0;
    }
    .back{
      border:1px solid rgba(255,255,255,.28);
      padding:10px 12px;
      border-radius:12px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-size:11px;
      background: rgba(255,255,255,.06);
    }
    .back:hover{background: rgba(255,255,255,.10)}
    .title{
      font-weight:900;
      letter-spacing:.14em;
      text-transform:uppercase;
      font-size:12px;
      opacity:.92;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .tip{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:18px 14px 70px;
    }

    /* Masonry-ish using columns (simple, reliable) */
    .masonry{
      column-count: 3;
      column-gap: 14px;
    }
    .tile{
      display:block;
      break-inside: avoid;
      margin:0 0 14px;
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      background:#0b0b0b;
      cursor:pointer;
      position:relative;
    }
    .tile img{
      width:100%;
      height:auto;
      display:block;
      transform:scale(1);
      transition: transform .25s ease;
    }
    .tile:hover img{transform:scale(1.02)}

    @media (max-width: 980px){
      .masonry{column-count:2}
    }
    @media (max-width: 620px){
      .masonry{column-count:1}
      .tip{display:none}
    }

    /* Lightbox */
    .lb{
      position:fixed; inset:0;
      display:none;
      z-index:100;
      background:rgba(0,0,0,.92);
    }
    .lb.open{display:block}
    .lb-inner{
      position:absolute; inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .lb-img{
      max-width:min(1100px, 94vw);
      max-height: min(86vh, 900px);
      border-radius:18px;
      border:1px solid rgba(255,255,255,.16);
      box-shadow: 0 20px 80px rgba(0,0,0,.65);
      background:#111;
      object-fit:contain;
    }
    .lb-top{
      position:absolute; top:14px; left:14px; right:14px;
      display:flex; align-items:center; justify-content:space-between;
      gap:12px;
      z-index:110;
      pointer-events:none;
    }
    .lb-meta{
      pointer-events:none;
      font-weight:900;
      letter-spacing:.14em;
      text-transform:uppercase;
      font-size:12px;
      color:rgba(255,255,255,.88);
    }
    .lb-actions{
      pointer-events:auto;
      display:flex; gap:10px; align-items:center;
    }
    .lb-btn{
      border:1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.08);
      color:#fff;
      border-radius:14px;
      padding:10px 14px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      font-size:11px;
      cursor:pointer;
    }
    .lb-btn:hover{background: rgba(255,255,255,.12)}
    .navBtn{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:54px; height:54px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      color:#fff;
      display:grid; place-items:center;
      font-size:26px;
      cursor:pointer;
      user-select:none;
    }
    .navBtn:hover{background: rgba(255,255,255,.10)}
    .prev{left:14px}
    .next{right:14px}

    .lb-foot{
      position:absolute; bottom:14px; left:14px; right:14px;
      text-align:center;
      color:rgba(255,255,255,.65);
      font-size:12px;
      letter-spacing:.08em;
    }
  </style>
</head>
<body>

  <div class="top">
    <div class="left">
      <a class="back" href="index.html#portfolio">Back</a>
      <div class="title">Portraits</div>
    </div>
    <div class="tip">Tip: Tap any image to view fullscreen</div>
  </div>

  <div class="wrap">
    <div class="masonry" id="masonry"></div>
  </div>

  <!-- Lightbox -->
  <div class="lb" id="lb" aria-hidden="true">
    <div class="lb-top">
      <div class="lb-meta" id="lbMeta">Portrait • 1 / 1</div>
      <div class="lb-actions">
        <a class="lb-btn" id="downloadBtn" href="#" download>Download</a>
        <button class="lb-btn" id="closeBtn">Close ×</button>
      </div>
    </div>

    <button class="navBtn prev" id="prevBtn" aria-label="Previous">‹</button>
    <button class="navBtn next" id="nextBtn" aria-label="Next">›</button>

    <div class="lb-inner" id="lbInner">
      <img class="lb-img" id="lbImg" alt="Fullscreen portrait" />
    </div>

    <div class="lb-foot">Swipe ← → on mobile • Keyboard: ← → • Esc to close</div>
  </div>

  <script>
    // ✅ EASIEST: just list filenames that exist in /images/portraits/
    // If your files are named 01.jpg, 02.jpg... keep it like this.
    const images = [
      "images/portraits/01.jpg",
      "images/portraits/02.jpg",
      "images/portraits/03.jpg",
      "images/portraits/04.jpg"
    ];

    // Build grid
    const masonry = document.getElementById("masonry");
    images.forEach((src, i) => {
      const a = document.createElement("a");
      a.className = "tile";
      a.href = src;
      a.addEventListener("click", (e) => {
        e.preventDefault();
        open(i);
      });

      const img = document.createElement("img");
      img.src = src;
      img.loading = "lazy";
      img.alt = "Portrait " + (i+1);
      a.appendChild(img);
      masonry.appendChild(a);
    });

    // Lightbox logic
    const lb = document.getElementById("lb");
    const lbImg = document.getElementById("lbImg");
    const lbMeta = document.getElementById("lbMeta");
    const downloadBtn = document.getElementById("downloadBtn");
    const closeBtn = document.getElementById("closeBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const lbInner = document.getElementById("lbInner");

    let index = 0;

    function setMeta(){
      lbMeta.textContent = `Portrait • ${index + 1} / ${images.length}`;
    }

    function open(i){
      index = i;
      const src = images[index];
      lb.classList.add("open");
      lb.setAttribute("aria-hidden", "false");
      lbImg.src = src;
      downloadBtn.href = src;
      setMeta();
      document.body.style.overflow = "hidden";
    }

    function close(){
      lb.classList.remove("open");
      lb.setAttribute("aria-hidden", "true");
      lbImg.src = "";
      document.body.style.overflow = "";
    }

    function prev(){
      index = (index - 1 + images.length) % images.length;
      open(index);
    }

    function next(){
      index = (index + 1) % images.length;
      open(index);
    }

    closeBtn.addEventListener("click", close);
    prevBtn.addEventListener("click", prev);
    nextBtn.addEventListener("click", next);

    // Click outside image closes
    lb.addEventListener("click", (e) => {
      if (e.target === lb || e.target === lbInner) close();
    });

    // Keyboard controls
    window.addEventListener("keydown", (e) => {
      if (!lb.classList.contains("open")) return;
      if (e.key === "Escape") close();
      if (e.key === "ArrowLeft") prev();
      if (e.key === "ArrowRight") next();
    });

    // Mobile swipe
    let startX = 0;
    lb.addEventListener("touchstart", (e) => {
      if (!lb.classList.contains("open")) return;
      startX = e.touches[0].clientX;
    }, {passive:true});

    lb.addEventListener("touchend", (e) => {
      if (!lb.classList.contains("open")) return;
      const endX = e.changedTouches[0].clientX;
      const dx = endX - startX;
      if (Math.abs(dx) > 40) dx > 0 ? prev() : next();
    }, {passive:true});
  </script>
</body>
</html>
