<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enhance Visual Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Inter;background:#0a0a0a;color:#eee;}
h1,h2{font-family:Playfair Display;}

header{
position:fixed;width:100%;top:0;
display:flex;justify-content:space-between;
padding:20px 40px;background:#000;
z-index:1000;
}

nav a{
margin-left:20px;color:white;text-decoration:none;cursor:pointer;
}

/* PAGES /
.page{display:none;padding:120px 40px;max-width:1000px;margin:auto;}
.active{display:block;}

/ HERO /
.hero{
height:100vh;display:flex;align-items:center;justify-content:center;
text-align:center;background:url('images/hero.jpg') center/cover;
}

/ PORTFOLIO /
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid img{width:100%;height:300px;object-fit:cover;}

/ EVENTS /
.event{border:1px solid #333;padding:20px;margin-top:20px;}
button{padding:10px 20px;background:none;color:white;border:1px solid white;cursor:pointer;}

/ LOGIN /
.login-box{max-width:400px;margin:auto;text-align:center;}
input{width:100%;padding:10px;margin:10px 0;background:#111;border:1px solid #333;color:white;}

footer{text-align:center;padding:40px;color:#777;}

@media(max-width:768px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
<h1>Enhance Visual Studio</h1>
<nav>
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('portfolio')">Portfolio</a>
<a onclick="showPage('events')">Events</a>
<a onclick="showPage('login')">Client Login</a>
<a onclick="showPage('booking')">Book</a>
</nav>
</header>

<!-- HOME -->
<div id="home" class="page active hero">
<div>
<h2>You Don’t Need Modeling Experience To Look Incredible</h2>
<button onclick="showPage('booking')">Book Now</button>
</div>
</div>

<!-- PORTFOLIO -->
<div id="portfolio" class="page">
<h2>Portfolio</h2>
<div class="grid">
<img src="images/portrait1.jpg">
<img src="images/portrait2.jpg">
<img src="images/portrait3.jpg">
<img src="images/portrait4.jpg">
</div>
</div>

<!-- EVENTS -->
<div id="events" class="page">
<h2>Event Galleries</h2>

<div class="event">
<h3>Smith Wedding</h3>
<p>Private gallery</p>
<button onclick="unlock('smith','1234','https://yourgallerylink.com')">Enter</button>
</div>

<div class="event">
<h3>Marcus Birthday</h3>
<button onclick="unlock('marcus','5678','https://yourgallerylink.com')">Enter</button>
</div>

</div>

<!-- LOGIN -->
<div id="login" class="page">
<h2>Client Login</h2>

<div class="login-box">
<input type="text" id="clientName" placeholder="Event Name">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Access Gallery</button>
</div>

</div>

<!-- BOOKING -->
<div id="booking" class="page">
<h2>Book Your Session</h2>
<iframe src="https://calendly.com/bookenhancevisualstudio/bookmysession" width="100%" height="600"></iframe>
</div>

<footer>
<p>© 2026 Enhance Visual Studio</p>
</footer>

<script>
function showPage(page){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(page).classList.add('active');
window.scrollTo(0,0);
}

/ SIMPLE PASSWORD SYSTEM /
function unlock(name,pass,link){
let input = prompt("Enter password:");
if(input === pass){
window.open(link, "_blank");
}else{
alert("Wrong password");
}
}

/ LOGIN PAGE SYSTEM */
function login(){
let name = document.getElementById('clientName').value.toLowerCase();
let pass = document.getElementById('password').value;

if(name === "smith" && pass === "1234"){
window.open("https://yourgallerylink.com");
}
else if(name === "marcus" && pass === "5678"){
window.open("https://yourgallerylink.com");
}
else{
alert("Invalid login");
}
}
</script>

</body>
</html>
