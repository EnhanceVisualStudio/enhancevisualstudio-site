<!DOCTYPE html>
<html>
<head>
<title>Enhance Visual Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0b0b0b;
color:white;
text-align:center;
}

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:url("hero.jpg") center/cover no-repeat;
}

h1{
font-size:48px;
letter-spacing:2px;
}

.tag{
font-size:20px;
margin-top:10px;
color:#ddd;
}

.button{
margin-top:30px;
padding:14px 30px;
background:white;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:4px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:8px;
padding:40px;
}

.gallery img{
width:100%;
height:auto;
}
</style>
</head>

<body>

<div class="hero">

<h1>Enhance Visual Studio</h1>

<div class="tag">Pose. Capture. Enhance.</div>

<a class="button" href="https://enhancevisualstudio.as.me">
Book a Session
</a>

</div>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">

</div>

</body>
</html>
