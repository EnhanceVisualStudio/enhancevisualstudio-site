<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enhance Visual Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/6b8b1b6c5f.js" crossorigin="anonymous"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#050505;
  color:#fff;
  font-family:Inter,sans-serif;
  opacity:0;
  animation:fadeIn .8s ease forwards;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

body.fade-out{
  opacity:0;
  transition:.4s;
}

a{text-decoration:none;color:white}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:25px 7%;
  z-index:10;
}

.logo{
  font-family:"Playfair Display",serif;
  letter-spacing:2px;
}

.links a{
  margin-left:25px;
  font-size:.75rem;
  letter-spacing:2px;
  opacity:.7;
}

.links a:hover{opacity:1}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.grid{
  position:absolute;
  inset:0;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:6px;
}

.grid img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.7);
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
}

.content{
  position:relative;
  z-index:2;
}

h1{
  font-family:"Playfair Display",serif;
  font-size:clamp(3rem,7vw,7rem);
  letter-spacing:4px;
}

.tagline{
  margin-top:15px;
  letter-spacing:4px;
  font-size:.9rem;
}

.btns{
  margin-top:35px;
}

.btn{
  border:1px solid white;
  padding:14px 28px;
  margin:8px;
  font-size:.75rem;
  letter-spacing:2px;
  transition:.3s;
}

.btn:hover{
  background:white;
  color:black;
}

/* FOOTER */
footer{
  padding:60px 7%;
  border-top:1px solid rgba(255,255,255,.1);
}

.footer-wrap{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.footer-left{
  font-family:"Playfair Display",serif;
}

.footer-right a{
  margin-left:18px;
  font-size:1.2rem;
  opacity:.7;
}

.footer-right a:hover{
  opacity:1;
}

.footer-bottom{
  margin-top:25px;
  font-size:.7rem;
  opacity:.5;
}

/* MOBILE */
@media(max-width:800px){
  .grid{
    grid-template-columns:repeat(2,1fr);
    grid-template-rows:repeat(3,1fr);
  }

  nav{
    flex-direction:column;
    text-align:center;
  }

  .links{
    margin-top:10px;
  }
}
</style>
</head>

<body>

<nav>
  <div class="logo">ENHANCE VISUAL STUDIO</div>
  <div class="links">
    <a href="index.html">HOME</a>
    <a href="portfolio.html">PORTFOLIO</a>
    <a href="book.html">BOOK</a>
    <a href="contact.html">CONTACT</a>
  </div>
</nav>

<section class="hero">
  <div class="grid">
    <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
    <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
    <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1">
    <img src="https://images.unsplash.com/photo-1487412912498-0447578fcca8">
    <img src="https://images.unsplash.com/photo-1495121605193-b116b5b09a4b">
  </div>

  <div class="overlay"></div>

  <div class="content">
    <h1>ENHANCE VISUAL STUDIO</h1>
    <p class="tagline">Pose. Capture. Enhance.</p>

    <div class="btns">
      <a class="btn" href="portfolio.html">ENTER</a>
      <a class="btn" href="book.html">BOOK NOW</a>
    </div>
  </div>
</section>

<footer>
  <div class="footer-wrap">
    <div class="footer-left">
      ENHANCE VISUAL STUDIO
    </div>

    <div class="footer-right">
      <a href="https://instagram.com/enhancevisualstudio" target="_blank">
        <i class="fab fa-instagram"></i>
      </a>
      <a href="https://tiktok.com/@enhancevisualstudio" target="_blank">
        <i class="fab fa-tiktok"></i>
      </a>
      <a href="mailto:hello@enhancevisualstudio.com">
        <i class="fas fa-envelope"></i>
      </a>
    </div>
  </div>

  <div class="footer-bottom">
    © 2026 Enhance Visual Studio — Pose. Capture. Enhance.
  </div>
</footer>

<script>
document.querySelectorAll("a").forEach(link=>{
  link.addEventListener("click",e=>{
    if(link.hostname === window.location.hostname){
      e.preventDefault();
      document.body.classList.add("fade-out");
      setTimeout(()=>{window.location.href = link.href},400);
    }
  });
});
</script>

</body>
</html>
