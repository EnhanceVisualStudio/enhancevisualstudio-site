<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enhance Visual Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  color: #fff;
  font-family: 'Inter', sans-serif;
  overflow: hidden;
}

/* IMAGE GRID BACKGROUND */
.grid {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-auto-rows: 33vh;
  gap: 5px;
  z-index: 1;
}

.grid img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(70%);
  transition: 0.5s ease;
}

.grid img:hover {
  filter: brightness(100%);
  transform: scale(1.05);
}

/* OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 2;
}

/* CENTER CONTENT */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 3;
  width: 90%;
}

.center h1 {
  font-family: 'Playfair Display', serif;
  font-size: 3rem;
  letter-spacing: 2px;
}

.center p {
  margin-top: 10px;
  font-size: 1rem;
  opacity: 0.8;
}

/* BUTTONS */
.buttons {
  margin-top: 30px;
}

.buttons a {
  text-decoration: none;
  color: #fff;
  border: 1px solid #fff;
  padding: 12px 25px;
  margin: 0 10px;
  font-size: 0.9rem;
  transition: 0.3s;
}

.buttons a:hover {
  background: #fff;
  color: #000;
}

/* NAV */
.nav {
  position: fixed;
  top: 20px;
  width: 100%;
  text-align: center;
  z-index: 4;
  font-size: 0.8rem;
  letter-spacing: 2px;
}

.nav a {
  margin: 0 15px;
  text-decoration: none;
  color: #fff;
  opacity: 0.7;
}

.nav a:hover {
  opacity: 1;
}

/* MOBILE */
@media(max-width: 768px){
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .center h1 {
    font-size: 2rem;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <a href="#">HOME</a>
  <a href="#">PORTFOLIO</a>
  <a href="#">BOOK</a>
  <a href="#">CONTACT</a>
</div>

<!-- IMAGE GRID -->
<div class="grid">
  <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
  <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
  <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
  <img src="https://images.unsplash.com/photo-1495121605193-b116b5b09a4b">
  <img src="https://images.unsplash.com/photo-1487412912498-0447578fcca8">
  <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1">
</div>

<!-- DARK OVERLAY -->
<div class="overlay"></div>

<!-- CENTER TEXT -->
<div class="center">
  <h1>ENHANCE VISUAL STUDIO</h1>
  <p>Where vision becomes editorial art.</p>

  <div class="buttons">
    <a href="#">ENTER</a>
    <a href="#">BOOK NOW</a>
  </div>
</div>

</body>
</html>
