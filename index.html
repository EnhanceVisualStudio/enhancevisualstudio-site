<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enhance Visual Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://kit.fontawesome.com/6b8b1b6c5f.js" crossorigin="anonymous"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#050505;
  color:white;
  font-family:Inter,sans-serif;
  opacity:0;
  animation:fadeIn .8s ease forwards;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

body.fade-out{
  opacity:0;
  transition:.4s;
}

a{text-decoration:none;color:white}

/* LOADER */
.loader{
  position:fixed;
  inset:0;
  background:#050505;
  z-index:9999;
  display:flex;
  align-items:center;
  justify-content:center;
}

.loader span{
  font-family:"Playfair Display",serif;
  letter-spacing:4px;
  animation:pulse 1.2s infinite alternate;
}

@keyframes pulse{
  from{opacity:.4}
  to{opacity:1}
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:25px 7%;
  z-index:100;
}

.logo{
  font-family:"Playfair Display",serif;
  letter-spacing:2px;
}

.links a{
  margin-left:25px;
  font-size:.75rem;
  letter-spacing:2px;
  opacity:.7;
}

.links a:hover{opacity:1}

.menu-btn{
  display:none;
}

/* FULL MENU */
.full-menu{
  position:fixed;
  inset:0;
  background:#050505;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  opacity:0;
  pointer-events:none;
  transition:.4s;
}

.full-menu.active{
  opacity:1;
  pointer-events:all;
}

.full-menu a{
  font-family:"Playfair Display",serif;
  font-size:clamp(3rem,7vw,7rem);
  margin:10px 0;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.grid{
  position:absolute;
  inset:0;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(2,1fr);
  gap:6px;
}

.grid img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.7);
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
}

.content{
  position:relative;
  z-index:2;
}

h1{
  font-family:"Playfair Display",serif;
  font-size:clamp(3rem,7vw,7rem);
  letter-spacing:4px;
}

.tagline{
  margin-top:15px;
  letter-spacing:4px;
  font-size:.9rem;
}

.btns{margin-top:35px}

.btn{
  border:1px solid white;
  padding:14px 28px;
  margin:8px;
  font-size:.75rem;
  letter-spacing:2px;
  position:relative;
  overflow:hidden;
}

.btn::before{
  content:"";
  position:absolute;
  left:-100%;
  top:0;
  width:100%;
  height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
  transition:.5s;
}

.btn:hover::before{
  left:100%;
}

.btn:hover{
  background:white;
  color:black;
}

/* FOOTER */
footer{
  padding:60px 7%;
  border-top:1px solid rgba(255,255,255,.1);
}

.footer-wrap{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.footer-right a{
  margin-left:18px;
  font-size:1.2rem;
  opacity:.7;
}

.footer-right a:hover{opacity:1}

.footer-bottom{
  margin-top:25px;
  font-size:.7rem;
  opacity:.5;
}

/* MOBILE */
@media(max-width:800px){
  .links{display:none}
  .menu-btn{display:block}

  .grid{
    grid-template-columns:repeat(2,1fr);
    grid-template-rows:repeat(3,1fr);
  }
}
</style>
</head>

<body>

<div class="loader"><span>ENHANCE VISUAL STUDIO</span></div>

<nav>
  <div class="logo">ENHANCE VISUAL STUDIO</div>

  <div class="links">
    <a href="index.html">HOME</a>
    <a href="portfolio.html">PORTFOLIO</a>
    <a href="book.html">BOOK</a>
    <a href="contact.html">CONTACT</a>
  </div>

  <div class="menu-btn" onclick="toggleMenu()">MENU</div>
</nav>

<div class="full-menu" id="menu">
  <a href="index.html">Home</a>
  <a href="portfolio.html">Portfolio</a>
  <a href="book.html">Book</a>
  <a href="contact.html">Contact</a>
</div>

<section class="hero">
  <div class="grid">
    <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
    <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c">
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
    <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1">
    <img src="https://images.unsplash.com/photo-1487412912498-0447578fcca8">
    <img src="https://images.unsplash.com/photo-1495121605193-b116b5b09a4b">
  </div>

  <div class="overlay"></div>

  <div class="content">
    <h1>ENHANCE VISUAL STUDIO</h1>
    <p class="tagline">Pose. Capture. Enhance.</p>

    <div class="btns">
      <a class="btn" href="portfolio.html">ENTER</a>
      <a class="btn" href="book.html">BOOK NOW</a>
    </div>
  </div>
</section>

<footer>
  <div class="footer-wrap">
    <div>ENHANCE VISUAL STUDIO</div>

    <div class="footer-right">
      <a href="https://instagram.com/enhancevisualstudio"><i class="fab fa-instagram"></i></a>
      <a href="https://tiktok.com/@enhancevisualstudio"><i class="fab fa-tiktok"></i></a>
      <a href="mailto:hello@enhancevisualstudio.com"><i class="fas fa-envelope"></i></a>
    </div>
  </div>

  <div class="footer-bottom">
    © 2026 Enhance Visual Studio — Pose. Capture. Enhance.
  </div>
</footer>

<script>
window.onload=()=>document.querySelector(".loader").style.display="none";

function toggleMenu(){
  document.getElementById("menu").classList.toggle("active");
}

document.querySelectorAll("a").forEach(link=>{
  link.addEventListener("click",e=>{
    if(link.hostname===window.location.hostname){
      e.preventDefault();
      document.body.classList.add("fade-out");
      setTimeout(()=>window.location=link.href,400);
    }
  });
});
</script>

</body>
</html>
