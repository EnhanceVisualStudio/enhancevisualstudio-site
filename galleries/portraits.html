<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#070707" />
  <title>Portraits — Enhance Visual Studio</title>

  <style>
    :root{ --bg:#070707; --text:#fff; --muted:rgba(255,255,255,.72); --line:rgba(255,255,255,.12); --radius:18px; --max:1120px; }
    *{ box-sizing:border-box; }
    body{ margin:0; background:var(--bg); color:var(--text); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
    a{ color:inherit; text-decoration:none; }
    .nav{ position:fixed; inset:0 0 auto 0; z-index:10; background:linear-gradient(to bottom, rgba(7,7,7,.85), rgba(7,7,7,.25)); border-bottom:1px solid rgba(255,255,255,.08); backdrop-filter: blur(10px); }
    .navin{ max-width:var(--max); margin:0 auto; padding:14px 18px; display:flex; justify-content:space-between; align-items:center; gap:14px; }
    .brand{ text-transform:uppercase; letter-spacing:1.4px; font-size:12px; line-height:1.1; }
    .brand span{ display:block; margin-top:4px; text-transform:none; letter-spacing:.2px; color:rgba(255,255,255,.55); font-size:11px; }
    .btn{ padding:10px 12px; border:1px solid rgba(255,255,255,.18); border-radius:999px; background:rgba(255,255,255,.03); font-size:12px; text-transform:uppercase; letter-spacing:1px; color:rgba(255,255,255,.85); }
    main{ max-width:var(--max); margin:0 auto; padding:96px 18px 40px; }
    h1{ margin:0 0 8px; font-size:28px; letter-spacing:-.2px; }
    .sub{ margin:0 0 18px; color:rgba(255,255,255,.6); font-size:13px; line-height:1.6; }
    .masonry{ columns:3 280px; column-gap:12px; }
    .tile{ break-inside: avoid; margin:0 0 12px; border-radius:var(--radius); overflow:hidden; border:1px solid rgba(255,255,255,.10); background:rgba(255,255,255,.02); }
    .tile img{ width:100%; height:auto; display:block; opacity:.96; transform:scale(1.01); transition:transform .45s ease, opacity .45s ease; }
    .tile:hover img{ transform:scale(1.05); opacity:1; }
    footer{ border-top:1px solid rgba(255,255,255,.10); padding:22px 18px; color:rgba(255,255,255,.55); font-size:12px; }
    .foot{ max-width:var(--max); margin:0 auto; display:flex; justify-content:space-between; gap:14px; flex-wrap:wrap; }
    @media (max-width:860px){ .masonry{ columns:2 220px; } }
    @media (max-width:520px){ .masonry{ columns:1; } }
  </style>
</head>

<body>
  <div class="nav">
    <div class="navin">
      <a class="brand" href="../index.html">ENHANCE VISUAL STUDIO <span>Pose. Capture. Enhance.</span></a>
      <a class="btn" href="../index.html#portfolio">Back</a>
    </div>
  </div>

  <main>
    <h1>Portraits</h1>
    <p class="sub">A curated selection — click Back to return to the homepage.</p>

    <div class="masonry">
      <div class="tile"><img src="../images/IMG_0250.jpeg" alt="Portrait"></div>
      <div class="tile"><img src="../images/IMG_0251.jpeg" alt="Portrait"></div>
      <div class="tile"><img src="../images/IMG_0253.jpeg" alt="Portrait"></div>
      <div class="tile"><img src="../images/IMG_0254.jpeg" alt="Portrait"></div>
    </div>
  </main>

  <footer>
    <div class="foot">
      <div>© <span id="year"></span> Enhance Visual Studio</div>
      <a href="mailto:hello@enhancevisualstudio.com">hello@enhancevisualstudio.com</a>
    </div>
  </footer>

  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
